version: "3.9"

services:

  service-registry:
    build: ./service-registry
    container_name: service-registry
    ports:
      - "8761:8761"
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep UP || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8088:8088"
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8088/actuator/health | grep UP || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  customer-service:
    build: ./customer-service
    container_name: customer-service
    ports:
      - "8080:8080"
    networks:
      - microservices-network
    depends_on:
      service-registry:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep UP || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  account-service:
    build: ./account-service
    container_name: account-service
    ports:
      - "8081:8081"
    networks:
      - microservices-network
    depends_on:
      service-registry:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep UP || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8060:8060"
    networks:
      - microservices-network
    depends_on:
      service-registry:
        condition: service_healthy
      config-server:
        condition: service_healthy
      customer-service:
        condition: service_healthy
      account-service:
        condition: service_healthy

networks:
  microservices-network:
    driver: bridge
