spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://service-registry:8761/eureka/

spring.config.import=optional:configserver:http://config-server:8088

server.port=8060

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.server.webmvc.routes[0].id=customer-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://CUSTOMER-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/customers/**

spring.cloud.gateway.server.webmvc.routes[1].id=account-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://ACCOUNT-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/account/**
